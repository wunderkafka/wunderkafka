fail_fast: true
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
  - repo: local
    hooks:
      - id: ruff-format
        name: ruff-format
        language: system
        entry: uv run --locked ruff format .
        pass_filenames: false
      - id: ruff
        name: ruff
        language: system
        entry: uv run --locked ruff check --fix
        pass_filenames: false
      - id: mypy
        name: mypy
        language: system
        entry: bash -c "uv run --locked mypy --config-file pyproject.toml ."
        pass_filenames: false
      - id: pytest-check
        name: pytest-check
        language: system
        entry: uv run --locked pytest
        pass_filenames: false
        always_run: true
        args: [
          "tests/"
        ]
      - id: pip-audit
        name: pip-audit
        language: system
        pass_filenames: false
        entry: >-
          sh -c 'command -v jq >/dev/null 2>&1 || { echo "pip-audit hook requires jq"; exit 1; }; output=$(uv run --locked pip-audit --format=json 2>/tmp/pip-audit-err); rc=$?; if [ $rc -eq 0 ]; then exit 0; elif [ $rc -ne 1 ]; then cat /tmp/pip-audit-err; echo "$output"; exit $rc; fi; fixable=$(echo "$output" | jq -e ".dependencies[] | select(.vulns[]? .fix_versions[]?)") && { uv run --locked pip-audit; exit $?; } || exit 0'
